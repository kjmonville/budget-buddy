name = "budget-buddy"
main = "worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
not_found_handling = "single-page-application"

[vars]
# Set ALLOWED_ORIGIN to your production Worker URL or custom domain after first deploy.
# Example: ALLOWED_ORIGIN = "https://budget-buddy.your-subdomain.workers.dev"
# Override per-environment below if needed.
ALLOWED_ORIGIN = ""

[[d1_databases]]
binding = "DB"
database_name = "budget-buddy-db"
# Replace with your actual database_id after running:
# npx wrangler d1 create budget-buddy-db
database_id = "8ac43c10-e147-4d98-b869-ae6b3a5068d9"
